<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breeder Dashboard | Furry Family</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #fafafa;">
    <div class="container">
        <header>
            <a href="index.html" class="logo">🐾 Furry Family <span style="font-size: 0.7rem; background: var(--primary); padding: 4px 10px; border-radius: 20px; color: black; margin-left:10px;">BREEDER</span></a>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <span id="user-display" style="font-weight: 700;"></span>
                <button class="btn btn-outline" style="padding: 0.5rem 1.2rem;" onclick="logout()">Logout</button>
            </div>
        </header>

        <nav class="dash-nav">
            <button class="btn btn-primary" onclick="showSection('my-pets')">Contribution Log</button>
            <button class="btn btn-outline" onclick="showSection('my-apps')">Visit Records</button>
            <button class="btn btn-outline" onclick="showSection('my-vet-apps')">Vet Appointments</button>
        </nav>

        <section id="my-pets-section" class="dash-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem;">Registered Pups</h2>
                <button class="btn btn-primary" onclick="openModal('pet-modal')">+ Register New Arrival</button>
            </div>
            <div id="breeder-pet-grid" class="pet-grid"></div>
        </section>

        <section id="my-apps-section" class="dash-section" style="display: none;">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">Coordination Log</h2>
            <div id="breeder-app-list"></div>
        </section>

        <section id="my-vet-apps-section" class="dash-section" style="display: none;">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">Vet Appointments</h2>
            <div id="breeder-vet-app-list"></div>
        </section>
    </div>

    <!-- Registration -->
    <div id="pet-modal" class="modal-overlay">
        <div class="modal">
            <h2 style="margin-bottom: 1.5rem;">New Pet Entry</h2>
            <form id="add-pet-form">
                <div class="form-group"><label>Name</label><input type="text" id="pet-name" required></div>
                <div class="form-group"><label>Specific Breed</label><input type="text" id="pet-species" required placeholder="e.g. Beagle / Maine Coon"></div>
                <div class="form-group"><label>Age</label><input type="number" id="pet-age" required></div>
                <div class="form-group"><label>Photo URL</label><input type="text" id="pet-image" placeholder="Paste image link..."></div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Finalize Entry</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal('pet-modal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const u = JSON.parse(localStorage.getItem('user'));
        if (!u || u.userType !== 'BREEDER') window.location.href = 'login.html';
        document.getElementById('user-display').innerText = u.name;

        function logout() { localStorage.removeItem('user'); window.location.href = 'login.html'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        window.showSection = function(id) {
            document.querySelectorAll('.dash-section').forEach(s => s.style.display = 'none');
            document.getElementById(`${id}-section`).style.display = 'block';

            // Toggle active button style
            document.querySelectorAll('.dash-nav button').forEach(btn => {
                if (btn.getAttribute('onclick').includes(`'${id}'`)) {
                    btn.classList.remove('btn-outline');
                    btn.classList.add('btn-primary');
                } else {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline');
                }
            });

            if (id === 'my-pets') loadMyPets();
            if (id === 'my-apps') loadMyApps();
            if (id === 'my-vet-apps') loadMyVetApps();
        }

        async function loadMyPets() {
            const res = await fetch('/pets/all');
            const pets = await res.json();
            const grid = document.getElementById('breeder-pet-grid');
            grid.innerHTML = pets.map(p => `
                <div class="pet-card">
                    <img src="${p.imageUrl || 'img/pet.png'}" alt="${p.name}">
                    <div class="pet-info">
                        <span style="color:var(--primary); font-size:0.7rem; font-weight:800; text-transform:uppercase;">${p.species}</span>
                        <h3 style="margin:0.5rem 0">${p.name}</h3>
                        <p style="color:var(--text-muted); font-size:0.85rem">Age: ${p.age} years</p>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('add-pet-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch('/pets/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('pet-name').value,
                    species: document.getElementById('pet-species').value,
                    age: document.getElementById('pet-age').value,
                    imageUrl: document.getElementById('pet-image').value || 'img/pet.png',
                    availabilityStatus: 'REGISTERED'
                })
            });
            alert('Entry registered.');
            closeModal('pet-modal');
            loadMyPets();
        });

        async function loadMyApps() {
            const res = await fetch('/appointments/all');
            const apps = await res.json();
            const mine = apps.filter(a => a.user && a.user.userId === u.userId);
            const list = document.getElementById('breeder-app-list');
            list.innerHTML = mine.length ? mine.map(a => `
                <div class="glass-panel" style="margin-bottom:1rem">
                    <span class="status-tag" style="background:var(--primary); color:black">${a.status}</span>
                    <h3 style="margin-top:0.5rem">Meeting for ${a.pet ? a.pet.name : 'Unknown Pet'}</h3>
                    <p style="color:var(--text-muted)">${a.date} | ${a.time}</p>
                </div>
            `).join('') : '<p>No visiting records yet.</p>';
        }

        async function loadMyVetApps() {
            try {
                const res = await fetch('/vetappointments/all');
                const apps = await res.json();

                const mine = apps.filter(a => a.user && a.user.userId === u.userId);

                const list = document.getElementById('breeder-vet-app-list');

                list.innerHTML = mine.length ? mine.map(a => {

                    const statusColor = {
                        BOOKED: '#ffd166',
                        CONFIRMED: '#06d6a0',
                        COMPLETED: '#118ab2',
                        CANCELLED: '#ef476f',
                        REJECTED: '#999'
                    }[a.status] || 'var(--primary)';

                    return `
                        <div class="glass-panel" style="margin-bottom:1rem">

                            <span class="status-tag" style="background:${statusColor}; color:black">
                                ${a.status}
                            </span>

                            <h3 style="margin-top:0.5rem">
                                Vet Visit for ${a.pet ? a.pet.name : 'Unknown Pet'}
                            </h3>

                            <p style="color:var(--text-muted)">
                                📅 ${a.date} | ⏰ ${a.time}
                            </p>

                            <p style="color:var(--text-muted)">
                                Type: ${a.appointmentType}
                            </p>

                            <div style="margin-top: 1rem; display:flex; gap:0.5rem;">

                                ${a.status !== 'CANCELLED' && a.status !== 'COMPLETED' ? `
                                    <button class="btn btn-outline" onclick="cancelVetApp(${a.appointmentId})">
                                        Cancel
                                    </button>
                                ` : ''}

                            </div>

                        </div>
                    `;
                }).join('') : '<p>No vet appointments yet.</p>';

            } catch (err) {
                console.error(err);
                document.getElementById('breeder-vet-app-list').innerHTML =
                    '<p>Error loading vet appointments.</p>';
            }
        }

        async function cancelVetApp(id) {
            if (!confirm('Cancel this appointment?')) return;

            await fetch(`/vetappointments/${id}`, {
                method: 'DELETE'
            });

            loadMyVetApps();
        }

        showSection('my-pets');


    </script>
</body>
</html>
