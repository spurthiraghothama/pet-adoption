<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | Furry Family</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #fafafa;">
    <div class="container">
        <header>
            <a href="index.html" class="logo">🐾 Furry Family <span style="font-size: 0.7rem; background: var(--text-dark); padding: 4px 10px; border-radius: 20px; color: white; margin-left:10px;">SHELLTER STAFF</span></a>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <span id="user-display" style="font-weight: 700;"></span>
                <button class="btn btn-outline" style="padding: 0.5rem 1.2rem;" onclick="logout()">Logout</button>
            </div>
        </header>

        <nav class="dash-nav">
            <button class="btn btn-primary" onclick="showSection('manage-pets')">Manage Listings</button>
            <button class="btn btn-outline" onclick="showSection('manage-apps')">Visiting Log</button>
            <button class="btn btn-outline" onclick="showSection('queries')">User Inquiries</button>
            <button class="btn btn-outline" onclick="showSection('tasks')">Task Oversight</button>
        </nav>

        <section id="manage-pets-section" class="dash-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem;">Current Residents</h2>
                <button class="btn btn-primary" onclick="openModal('pet-modal')">+ Add Record</button>
            </div>
            <div id="staff-pet-grid" class="pet-grid"></div>
        </section>

        <section id="manage-apps-section" class="dash-section" style="display: none;">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">Appointments Management</h2>
            <div id="staff-app-list"></div>
        </section>

        <section id="queries-section" class="dash-section" style="display: none;">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">Help Requests</h2>
            <div id="staff-query-list"></div>
        </section>

        <section id="tasks-section" class="dash-section" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem;">Volunteer Assignments</h2>
                <button class="btn btn-primary" onclick="openModal('task-modal')">+ Assign Task</button>
            </div>
            <div id="staff-task-list"></div>
        </section>
    </div>

    <!-- Modals -->
    <div id="pet-modal" class="modal-overlay">
        <div class="modal">
            <h2>Pet Registration</h2>
            <form id="add-pet-form">
                <div class="form-group"><label>Name</label><input type="text" id="pet-name" required></div>
                <div class="form-group"><label>Species</label><input type="text" id="pet-species" required placeholder="Dog / Cat"></div>
                <div class="form-group"><label>Age</label><input type="number" id="pet-age" required></div>
                <div class="form-group"><label>Health Status</label><input type="text" id="pet-health" value="Healthy"></div>
                <div class="form-group"><label>Image URL</label><input type="text" id="pet-img" placeholder="img/pet.png"></div>
                <div class="form-group"><label>Vaccinated?</label><select id="pet-vacc"><option value="true">Yes</option><option value="false">No</option></select></div>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save Entry</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal('pet-modal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="vet-check-modal" class="modal-overlay">
        <div class="modal">
            <h2>Schedule Vet Evaluation</h2>
            <form id="vet-check-form">
                <input type="hidden" id="vet-pet-id">
                <div class="form-group"><label>Requested Date</label><input type="date" id="vet-date" required></div>
                <div class="form-group"><label>Requested Time</label><input type="time" id="vet-time" required></div>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Create Checkup</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal('vet-check-modal')">Close</button>
                </div>
            </form>
        </div>
    </div>

    <div id="task-modal" class="modal-overlay">
        <div class="modal">
            <h2>New Volunteer Task</h2>
            <form id="add-task-form">
                <div class="form-group"><label>Task Title</label><input type="text" id="task-desc" required></div>
                <div class="form-group">
                    <label>Assign To Volunteer</label>
                    <select id="task-vol" style="background:#fff;">
                        <option value="">-- Unassigned --</option>
                    </select>
                </div>
                <div class="form-group"><label>Details</label><textarea id="task-specs" rows="3"></textarea></div>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Assign</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal('task-modal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="response-modal" class="modal-overlay">
        <div class="modal">
            <h2>Reply to Inquirer</h2>
            <form id="response-form">
                <input type="hidden" id="resp-query-id">
                <div class="form-group"><label>Message</label><textarea id="resp-text" required rows="5"></textarea></div>
                <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Resolve & Send</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal('response-modal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/dashboard-staff.js"></script>
    <script>
        const u = JSON.parse(localStorage.getItem('user'));
        if (!u || !u.userType.includes('STAFF')) window.location.href = 'login.html';
        document.getElementById('user-display').innerText = u.name;
        function logout() { localStorage.removeItem('user'); window.location.href = 'login.html'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
