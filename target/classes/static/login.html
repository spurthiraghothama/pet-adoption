<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Furry Family</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #fdfdfd; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .login-box { width: 100%; max-width: 450px; padding: 4rem; text-align: center; }
    </style>
</head>
<body>
    <div class="glass-panel login-box">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 2rem; font-size: 1.5rem;">🐾 Furry Family</a>
        <h2 style="margin-bottom: 0.5rem; font-size: 2.5rem;">Welcome</h2>
        <p style="color:var(--text-muted); margin-bottom: 3rem;">Sign in to your member dashboard</p>
        
        <form id="login-form">
            <div class="form-group" style="text-align: left;">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="your@email.com" style="border-radius: 50px;">
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="••••••••" style="border-radius: 50px;">
            </div>
            <div class="form-group" style="text-align: left;">
                <label>Login Role</label>
                <select id="role-select" style="border-radius: 50px; background: #fff;">
                    <option value="ADOPTER">Adopter</option>
                    <option value="STAFF">Shelter Staff</option>
                    <option value="VOLUNTEER">Volunteer</option>
                    <option value="BREEDER">Breeder</option>
                    <option value="VETERINARIAN">Veterinarian</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem;">Continue ➜</button>
        </form>
        
        <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="index.html" style="color:var(--primary); text-decoration: none; font-weight: 700;">Join now</a>
        </p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('login-email').value.trim(),
                password: document.getElementById('login-password').value.trim(),
                role: document.getElementById('role-select').value
            };
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                const user = await res.json();
                localStorage.setItem('user', JSON.stringify(user));
                const type = user.userType.toUpperCase();
                if (type.includes('ADOPTER')) window.location.href = 'dashboard-adopter.html';
                else if (type.includes('STAFF')) window.location.href = 'dashboard-staff.html';
                else if (type.includes('VOLUNTEER')) window.location.href = 'dashboard-volunteer.html';
                else if (type.includes('BREEDER')) window.location.href = 'dashboard-breeder.html';
                else if (type.includes('VET')) window.location.href = 'dashboard-vet.html';
            } else {
                alert('Invalid login credentials.');
            }
        });
    </script>
</body>
</html>
