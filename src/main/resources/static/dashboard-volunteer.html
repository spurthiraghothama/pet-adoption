<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard | Furry Family</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.3s;
            border-radius: 34px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: var(--primary);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(22px);
        }
    </style>

</head>
<body style="background: #fafafa;">
    <div class="container">
        <header>
            <a href="index.html" class="logo">🐾 Furry Family <span style="font-size: 0.7rem; background: var(--primary); padding: 4px 10px; border-radius: 20px; color: black; margin-left:10px;">VOLUNTEER</span></a>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <div style="display: flex; align-items: center; gap: 0.8rem;">
                    <span style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);">Available</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="availability-toggle" checked onchange="toggleAvailability()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <span id="user-display" style="font-weight: 700;"></span>
                <button class="btn btn-outline" style="padding: 0.5rem 1.2rem;" onclick="logout()">Logout</button>
            </div>
        </header>

        <nav class="dash-nav">
            <button class="btn btn-primary" onclick="showSection('open-tasks')">Open Tasks</button>
            <button class="btn btn-outline" onclick="showSection('tasks')">My Queue</button>
            <button class="btn btn-outline" onclick="showSection('reg-pet')">Register Rescue</button>
            <button class="btn btn-outline" onclick="showSection('my-registrations')">My Registrations</button>
        </nav>

        <!-- 🟢 OPEN TASKS -->
        <section id="open-tasks-section" class="dash-section">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">Open Tasks</h2>
            <div id="open-task-grid" class="pet-grid"></div>
        </section>

        <!-- 🔵 MY QUEUE -->
        <section id="tasks-section" class="dash-section" style="display: none;">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">My Queue</h2>
            <div id="volunteer-task-grid" class="pet-grid"></div>
        </section>

        <section id="reg-pet-section" class="dash-section" style="display: none;">
            <div style="max-width: 700px; margin: 0 auto;" class="glass-panel">
                <h2 style="margin-bottom: 2rem;">Submit Rescue Entry</h2>
                <form id="rescue-form">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem;">
                        <div class="form-group"><label>Name</label><input type="text" id="p-name" required placeholder="Unknown/Given Name"></div>
                        <div class="form-group"><label>Species/Breed</label><input type="text" id="p-species" required placeholder="e.g. Golden Retriever"></div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem;">
                        <div class="form-group"><label>Age</label><input type="number" id="p-age" required></div>
                        <div class="form-group"><label>Current Status</label><input type="text" id="p-health" placeholder="Injured / Healthy / Stressed"></div>
                    </div>
                    <div class="form-group">
                        <label>Photograph URL</label>
                        <input type="text" id="p-img" placeholder="Paste link here...">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">Complete Registry ➜</button>
                </form>
            </div>
        </section>

        <section id="my-registrations-section" class="dash-section" style="display: none;">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">My Registered Pets</h2>
            <div id="my-registrations-list"></div>
        </section>

    </div>

    <script>
        const u = JSON.parse(localStorage.getItem('user'));
        if (!u || u.userType !== 'VOLUNTEER') window.location.href = 'login.html';
        document.getElementById('user-display').innerText = u.name;

        // Load availability status on page load
        async function loadAvailabilityStatus() {
            const res = await fetch(`/users/volunteers/${u.userId}/status`);
            const volunteer = await res.json();
            const toggle = document.getElementById('availability-toggle');
            toggle.checked = volunteer.availabilityStatus !== false;
        }

        async function toggleAvailability() {
            const toggle = document.getElementById('availability-toggle');
            const status = toggle.checked;
            
            const res = await fetch(`/users/volunteers/${u.userId}/availability?status=${status}`, {
                method: 'PATCH'
            });
            
            if (!res.ok) {
                alert('Failed to update availability. Please try again.');
                toggle.checked = !status; // Revert UI
                return;
            }
            
            // Reload open tasks if we're on that section
            const openTasksSection = document.getElementById('open-tasks-section');
            if (openTasksSection.style.display !== 'none') {
                loadOpenTasks();
            }
        }

        function logout() { localStorage.removeItem('user'); window.location.href = 'login.html'; }
        
        window.showSection = function(id) {
            document.querySelectorAll('.dash-section').forEach(s => s.style.display = 'none');
            document.getElementById(`${id}-section`).style.display = 'block';

            // Toggle active button style
            document.querySelectorAll('.dash-nav button').forEach(btn => {
                if (btn.getAttribute('onclick').includes(`'${id}'`)) {
                    btn.classList.remove('btn-outline');
                    btn.classList.add('btn-primary');
                } else {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline');
                }
            });

            if (id === 'open-tasks') loadOpenTasks();
            if (id === 'tasks') loadMyTasks();
            if (id === 'my-registrations') loadMyRegistrations();
        };

        // 🟢 OPEN TASKS - Only show if available
        async function loadOpenTasks() {
            const grid = document.getElementById('open-task-grid');
            const toggle = document.getElementById('availability-toggle');
            
            // Check if volunteer is available
            if (!toggle.checked) {
                grid.innerHTML = `
                    <div class="glass-panel" style="text-align: center; padding: 3rem;">
                        <h3 style="color: var(--text-muted);">⏸️ You're currently unavailable</h3>
                        <p style="color: var(--text-muted); margin-top: 1rem;">
                            Please turn on your availability to view open tasks
                        </p>
                    </div>
                `;
                return;
            }

            const res = await fetch('/tasks/open');
            const tasks = await res.json();

            grid.innerHTML = tasks.length ? tasks.map(t => `
                <div class="glass-panel">
                    <span class="status-tag" style="background:var(--primary); color:black">${t.status}</span>
                    <h3 style="margin-top:1rem">${t.description}</h3>
                    <p style="color:var(--text-muted); margin-bottom:1.5rem">${t.specifications || 'Standard duty'}</p>

                    <button class="btn btn-primary" style="font-size:0.8rem"
                        onclick="chooseTask(${t.taskId})">
                        Choose
                    </button>
                </div>
            `).join('') : '<p>No open tasks available.</p>';
        }

        // 🔵 MY TASKS
        async function loadMyTasks() {
            const grid = document.getElementById('volunteer-task-grid');
            const res = await fetch(`/tasks/volunteer/${u.userId}`);
            const tasks = await res.json();

            grid.innerHTML = tasks.length ? tasks.map(t => `
                <div class="glass-panel">
                    <span class="status-tag" style="background:#55efc4; color:black">${t.status}</span>
                    <h3 style="margin-top:1rem">${t.description}</h3>
                    <p style="color:var(--text-muted); margin-bottom:1.5rem">${t.specifications || 'Standard duty'}</p>
                    ${t.volunteer ? `<p style="font-size:0.85rem; color:var(--accent-orange)">Assigned to: ${t.volunteer.name}</p>` : ''}

                    <div style="display:flex; gap:0.5rem">

                        ${t.status === 'ASSIGNED' ? `
                            <button class="btn btn-primary" style="font-size:0.8rem"
                                onclick="startTask(${t.taskId})">
                                Start
                            </button>
                        ` : ''}

                        ${t.status === 'IN_PROGRESS' ? `
                            <button class="btn btn-outline" style="font-size:0.8rem; border-color:#55efc4"
                                onclick="completeTask(${t.taskId})">
                                Complete
                            </button>
                        ` : ''}

                        ${t.status === 'MONITORED' ? `
                            <span style="color:orange;">Waiting for approval</span>
                        ` : ''}

                    </div>
                </div>
            `).join('') : '<p>No tasks in your queue.</p>';
        }

        async function chooseTask(taskId) {
            await fetch(`/tasks/${taskId}/choose/${u.userId}`, {
                method: 'PATCH'
            });
            loadOpenTasks();
            alert('Task added to your queue!');
        }

        async function completeTask(taskId) {
            await fetch(`/tasks/${taskId}/complete`, {
                method: 'PATCH'
            });
            loadMyTasks();
        }

        async function startTask(taskId) {
            await fetch(`/tasks/${taskId}/start`, {
                method: 'PATCH'
            });
            loadMyTasks();
        }

        document.getElementById('rescue-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch('/pets/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('p-name').value,
                    species: document.getElementById('p-species').value,
                    age: document.getElementById('p-age').value,
                    healthStatus: document.getElementById('p-health').value,
                    imageUrl: document.getElementById('p-img').value || 'img/pet.png',
                    registeredById: u.userId,
                    registeredByType: 'VOLUNTEER',
                    availabilityStatus: 'UNDER_REVIEW',
                })
            });
            alert('Rescue entry successful!');
            document.getElementById('rescue-form').reset();
            showSection('tasks');
        });

        async function loadMyRegistrations() {
            const list = document.getElementById('my-registrations-list');
            const res = await fetch(`/pets/my-registrations?userId=${u.userId}&userType=VOLUNTEER`);
            const pets = await res.json();
            const statusColor = { AVAILABLE: '#55efc4', REJECTED: '#ff7675', REGISTERED: '#f1c40f', UNDER_REVIEW: '#74b9ff' };
            list.innerHTML = pets.length ? pets.map(p => `
                <div class="glass-panel animate-in" style="margin-bottom:1rem; display:flex; gap:1.5rem; align-items:center;">
                    <img src="${p.imageUrl || 'img/pet.png'}" style="width:70px; height:70px; border-radius:12px; object-fit:cover;">
                    <div>
                        <h3>${p.name}</h3>
                        <p style="color:var(--text-muted); font-size:0.85rem">${p.species} | Age: ${p.age}</p>
                        <span class="status-tag" style="background:${statusColor[p.availabilityStatus] || '#ccc'}; color:black; margin-top:0.5rem; display:inline-block;">
                            ${p.availabilityStatus}
                        </span>
                    </div>
                </div>
            `).join('') : '<p style="color:var(--text-muted)">You have not registered any pets yet.</p>';
        }

        // Initialize
        loadAvailabilityStatus();
        showSection('open-tasks');
</script>



</body>
</html>
