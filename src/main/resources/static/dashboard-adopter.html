<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopter Dashboard | Furry Family</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #fafafa;">
    <div class="container">
        <header>
            <a href="index.html" class="logo">🐾 Furry Family <span style="font-size: 0.7rem; background: var(--primary); padding: 4px 10px; border-radius: 20px; color: black; margin-left:10px;">ADOPTER</span></a>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <span id="user-display" style="font-weight: 700;"></span>
                <button class="btn btn-outline" style="padding: 0.5rem 1.2rem;" onclick="logout()">Logout</button>
            </div>
        </header>

        <nav class="dash-nav">
            <button class="btn btn-primary" onclick="showSection('pets')">Browse Furry Friends</button>
            <button class="btn btn-outline" onclick="showSection('appointments')">My Appointments</button>
            <button class="btn btn-outline" onclick="showSection('adoptions')">My Adoptions</button>
            <button class="btn btn-outline" onclick="showSection('queries')">Help Requests</button>
        </nav>

        <section id="pets-section" class="dash-section">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">Ready for adoption</h2>
            <div id="pet-grid" class="pet-grid"></div>
        </section>

        <section id="appointments-section" class="dash-section" style="display: none;">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">My Scheduled Visits</h2>
            <div id="appointment-list"></div>
        </section>

        <section id="adoptions-section" class="dash-section" style="display: none;">
            <h2 style="margin-bottom: 2rem; font-size: 2rem;">My Adoptions</h2>
            <div id="adoption-list"></div>
        </section>

        <section id="queries-section" class="dash-section" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem;">Support</h2>
                <button class="btn btn-primary" onclick="openModal('query-modal')">Ask a Question</button>
            </div>
            <div id="query-list"></div>
        </section>
    </div>

    <!-- Modals -->
    <div id="booking-modal" class="modal-overlay">
        <div class="modal">
            <h2 id="booking-title" style="margin-bottom: 1.5rem;">Schedule Visit</h2>
            <form id="booking-form">
                <input type="hidden" id="booking-pet-id">
                <div class="form-group"><label>Date</label><input type="date" id="book-date" required></div>
                <div class="form-group"><label>Time</label><input type="time" id="book-time" required></div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Book Now</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal('booking-modal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="query-modal" class="modal-overlay">
        <div class="modal">
            <h2 style="margin-bottom: 1.5rem;">New Inquiry</h2>
            <form id="ask-query-form">
                <div class="form-group">
                    <label>Your Message</label>
                    <textarea id="query-text" required rows="5" placeholder="How can we help?"></textarea>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Send Query</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal('query-modal')">Close</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/dashboard-adopter.js"></script>
    <script>
        const u = JSON.parse(localStorage.getItem('user'));
        if (!u || !u.userType.includes('ADOPTER')) window.location.href = 'login.html';
        document.getElementById('user-display').innerText = u.name;
        function logout() { localStorage.removeItem('user'); window.location.href = 'login.html'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
