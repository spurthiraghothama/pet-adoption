<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breeder Dashboard | Furry Family</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #fafafa;">
    <div class="container">
        <header>
            <a href="index.html" class="logo">🐾 Furry Family <span style="font-size: 0.7rem; background: var(--primary); padding: 4px 10px; border-radius: 20px; color: black; margin-left:10px;">BREEDER</span></a>
            <div style="display: flex; gap: 1.5rem; align-items: center;">
                <span id="user-display" style="font-weight: 700;"></span>
                <button class="btn btn-outline" style="padding: 0.5rem 1.2rem;" onclick="logout()">Logout</button>
            </div>
        </header>

        <nav class="dash-nav">
            <button class="btn btn-primary" onclick="showSection('my-pets')">Contribution Log</button>
        </nav>

        <section id="my-pets-section" class="dash-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-size: 2rem;">Registered Pups</h2>
                <button class="btn btn-primary" onclick="openModal('pet-modal')">+ Register New Arrival</button>
            </div>
            <div id="breeder-pet-grid" class="pet-grid"></div>
        </section>

    </div>

    <!-- Registration -->
    <div id="pet-modal" class="modal-overlay">
        <div class="modal">
            <h2 style="margin-bottom: 1.5rem;">New Pet Entry</h2>
            <form id="add-pet-form">
                <div class="form-group"><label>Name</label><input type="text" id="pet-name" required></div>
                <div class="form-group"><label>Specific Breed</label><input type="text" id="pet-species" required placeholder="e.g. Beagle / Maine Coon"></div>
                <div style="display:flex; gap:1rem;">
                    <div class="form-group" style="flex:1;"><label>Age Years</label><input type="number" id="pet-age" min="0" required></div>
                    <div class="form-group" style="flex:1;"><label>Age Months</label><input type="number" id="pet-age-months" min="0" max="11" value="0" required></div>
                </div>
                <div class="form-group"><label>Photo URL</label><input type="text" id="pet-image" placeholder="Paste image link..."></div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Finalize Entry</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal('pet-modal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="vet-modal" class="modal-overlay">
        <div class="modal">
            <h2 style="margin-bottom: 1.5rem;">Book Vet Appointment</h2>
            <form id="book-vet-form">
                <input type="hidden" id="vet-pet-id">
                <div class="form-group"><label>Pet</label><input type="text" id="vet-pet-name" readonly></div>
                <div class="form-group"><label>Date</label><input type="date" id="vet-date" required></div>
                <div class="form-group">
                    <label>Time Slot</label>
                    <select id="vet-time" required>
                        <option value="">Select a slot</option>
                        <option value="10:00">10:00 AM - 11:00 AM</option>
                        <option value="11:00">11:00 AM - 12:00 PM</option>
                        <option value="12:00">12:00 PM - 1:00 PM</option>
                        <option value="13:00">1:00 PM - 2:00 PM</option>
                        <option value="15:00">3:00 PM - 4:00 PM</option>
                        <option value="16:00">4:00 PM - 5:00 PM</option>
                        <option value="17:00">5:00 PM - 6:00 PM</option>
                        <option value="18:00">6:00 PM - 7:00 PM</option>
                        <option value="19:00">7:00 PM - 8:00 PM</option>
                    </select>
                </div>
                <p style="color:var(--text-muted); font-size:0.85rem; margin-top:0.5rem;">Available Monday to Sunday. Break: 2:00 PM - 3:00 PM.</p>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Book Appointment</button>
                    <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal('vet-modal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const u = JSON.parse(localStorage.getItem('user'));
        if (!u || u.userType !== 'BREEDER') window.location.href = 'login.html';
        document.getElementById('user-display').innerText = u.name;
        document.getElementById('vet-date').min = new Date().toISOString().split('T')[0];

        function formatAge(pet) {
            const years = Number(pet.age || 0);
            const months = Number(pet.ageMonths || 0);
            const parts = [];
            if (years > 0) parts.push(`${years} year${years === 1 ? '' : 's'}`);
            if (months > 0) parts.push(`${months} month${months === 1 ? '' : 's'}`);
            return parts.length ? parts.join(' ') : '0 months';
        }

        function logout() { localStorage.removeItem('user'); window.location.href = 'login.html'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        window.showSection = function(id) {
            document.querySelectorAll('.dash-section').forEach(s => s.style.display = 'none');
            document.getElementById(`${id}-section`).style.display = 'block';

            // Toggle active button style
            document.querySelectorAll('.dash-nav button').forEach(btn => {
                if (btn.getAttribute('onclick').includes(`'${id}'`)) {
                    btn.classList.remove('btn-outline');
                    btn.classList.add('btn-primary');
                } else {
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-outline');
                }
            });

            if (id === 'my-pets') loadMyPets();
        }

        async function loadMyPets() {
            const res = await fetch(`/pets/my-registrations?userId=${u.userId}&userType=BREEDER`);
            const pets = await res.json();
            const grid = document.getElementById('breeder-pet-grid');
            const statusColor = { AVAILABLE: '#55efc4', REJECTED: '#ff7675', REGISTERED: '#f1c40f', UNDER_REVIEW: '#74b9ff', ADOPTED: '#a29bfe' };
            grid.innerHTML = pets.length ? pets.map(p => `
                <div class="pet-card">
                    <img src="${p.imageUrl || 'img/pet.png'}" alt="${p.name}">
                    <div class="pet-info">
                        <span style="color:var(--primary); font-size:0.7rem; font-weight:800; text-transform:uppercase;">${p.species}</span>
                        <h3 style="margin:0.5rem 0">${p.name}</h3>
                        <p style="color:var(--text-muted); font-size:0.85rem">Age: ${formatAge(p)}</p>
                        <span class="status-tag" style="background:${statusColor[p.availabilityStatus] || '#ccc'}; color:black; font-size:0.75rem; margin-top:0.5rem; display:inline-block;">
                            ${p.availabilityStatus}
                        </span>
                        <div style="margin-top: 1rem;">
                            ${p.availabilityStatus === 'REGISTERED' ? `
                                <button class="btn btn-outline" onclick="openVetModal(${p.petId}, '${encodeURIComponent(p.name)}')">
                                    Book Vet Appointment
                                </button>
                            ` : `
                                <p style="color:var(--text-muted); font-size:0.85rem; margin:0;">Vet booking is only available while status is REGISTERED.</p>
                            `}
                        </div>
                    </div>
                </div>
            `).join('') : '<p style="color:var(--text-muted)">No pets registered yet.</p>';
        }

        window.openVetModal = function(petId, encodedName) {
            document.getElementById('vet-pet-id').value = petId;
            document.getElementById('vet-pet-name').value = decodeURIComponent(encodedName);
            document.getElementById('book-vet-form').reset();
            document.getElementById('vet-pet-id').value = petId;
            document.getElementById('vet-pet-name').value = decodeURIComponent(encodedName);
            document.getElementById('vet-date').min = new Date().toISOString().split('T')[0];
            openModal('vet-modal');
        }

        document.getElementById('add-pet-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await fetch('/pets/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('pet-name').value,
                    species: document.getElementById('pet-species').value,
                    age: document.getElementById('pet-age').value,
                    ageMonths: document.getElementById('pet-age-months').value,
                    imageUrl: document.getElementById('pet-image').value || 'img/pet.png',
                    availabilityStatus: 'REGISTERED',
                    registeredById: u.userId,
                    registeredByType: 'BREEDER'
                })
            });
            alert('Entry registered.');
            closeModal('pet-modal');
            loadMyPets();
        });

        document.getElementById('book-vet-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const response = await fetch('/vetappointments/book', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    petId: Number(document.getElementById('vet-pet-id').value),
                    userId: u.userId,
                    date: document.getElementById('vet-date').value,
                    time: document.getElementById('vet-time').value
                })
            });

            if (!response.ok) {
                let message = 'Unable to book appointment.';
                try {
                    const errorPayload = await response.json();
                    message = errorPayload.error || message;
                } catch (err) {
                    const errorText = await response.text();
                    if (errorText) message = errorText;
                }
                alert(message);
                return;
            }

            alert('Vet appointment booked.');
            closeModal('vet-modal');
            loadMyPets();
        });

        showSection('my-pets');


    </script>
</body>
</html>
