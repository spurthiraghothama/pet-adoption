<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PetHaven</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="glass-panel modal" style="display: block; position: static; max-width: 400px; width: 90%;">
        <div class="logo" style="text-align: center; margin-bottom: 2rem;">PetHaven</div>
        <h2 style="text-align: center;">Welcome Back</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 2rem;">Please sign in to your account</p>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Login As</label>
                <select id="login-role" style="width: 100%; padding: 0.75rem 1rem; border-radius: 12px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border); color: white; outline: none; cursor: pointer;">
                    <option value="ADOPTER">Adopter</option>
                    <option value="STAFF">Shelter Staff</option>
                    <option value="VOLUNTEER">Volunteer</option>
                </select>
            </div>
            <button type="submit" id="signin-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
        </form>
        <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="index.html" style="color: var(--primary); text-decoration: none;">Register here</a>
        </p>
    </div>

    <script>
        console.log("Login script loaded");
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log("Form submitted");
            
            const btn = document.getElementById('signin-btn');
            const originalText = btn.innerText;
            btn.innerText = "Signing in...";
            btn.disabled = true;

            const payload = {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value,
                role: document.getElementById('login-role').value
            };

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const user = await response.json();
                    console.log("Login successful", user);
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    // Comprehensive redirect logic
                    if (user.userType === 'ADOPTER') window.location.href = 'dashboard-adopter.html';
                    else if (user.userType === 'STAFF' || user.userType === 'SHELTER_STAFF') window.location.href = 'dashboard-staff.html';
                    else if (user.userType === 'VOLUNTEER') window.location.href = 'dashboard-volunteer.html';
                    else {
                        alert("Unknown role: " + user.userType);
                        btn.disabled = false;
                        btn.innerText = originalText;
                    }
                } else {
                    const errorMsg = await response.text();
                    alert('Login failed: ' + errorMsg);
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (error) {
                console.error("Login fetch error", error);
                alert('Connection error. Is the server running?');
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
